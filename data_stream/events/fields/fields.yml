- name: client.ip
  type: ip
  description: IP address of the network client (DHCP/WiFi events).

- name: client.mac
  type: keyword
  description: MAC address of the network client.

- name: client.hostname
  type: keyword
  description: Hostname of the network client (from DHCP).

- name: rule.name
  type: keyword
  description: Name of the firewall rule that generated this event.

- name: observer.ingress.interface.name
  type: keyword
  description: >
    Inbound network interface name. Populated from iptables IN= field (firewall events)
    and DHCP interface (dnsmasq DHCPACK events).

- name: observer.egress.interface.name
  type: keyword
  description: Outbound network interface name from iptables OUT= field (firewall events).

- name: user.auth_method
  type: keyword
  description: SSH authentication method used (e.g. publickey, password).

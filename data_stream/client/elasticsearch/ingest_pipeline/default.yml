---
description: Pipeline for UniFi client metrics
processors:
  - set:
      field: ecs.version
      value: "8.11.0"
  - set:
      field: event.kind
      value: metric
  - set:
      field: event.type
      value: info
  - set:
      field: event.category
      value: network
  - remove:
      field: metrics.unifi.client.wifi
      if: "ctx?.metrics?.unifi?.client?.wifi != null && ctx.metrics.unifi.client.wifi.isEmpty()"
      ignore_missing: true

  # Convert client.ip string → ECS ip type
  - remove:
      field: client.ip
      if: "ctx?.client?.ip == ''"
      ignore_missing: true
  - convert:
      field: client.ip
      type: ip
      ignore_missing: true
      ignore_failure: true

  # Remove empty ECS fields added by CEL
  - remove:
      field: network.name
      if: "ctx?.network?.name == ''"
      ignore_missing: true
  - remove:
      field: network.vlan.id
      if: "ctx?.network?.vlan?.id == ''"
      ignore_missing: true
  - remove:
      field: observer.mac
      if: "ctx?.observer?.mac == ''"
      ignore_missing: true
on_failure:
  - append:
      field: error.message
      value: >-
        Processor {{ _ingest.on_failure_processor_type }} (tag:
        {{ _ingest.on_failure_processor_tag }}) failed with message:
        {{ _ingest.on_failure_message }}
  - set:
      field: event.kind
      value: pipeline_error

---
description: Pipeline for UniFi client metrics
processors:
  - set:
      field: ecs.version
      value: "8.11.0"
  - set:
      field: event.kind
      value: metric
  - set:
      field: event.type
      value: info
  - set:
      field: event.category
      value: network
  - remove:
      field: metrics.unifi.client.wifi
      if: "ctx?.metrics?.unifi?.client?.wifi != null && ctx.metrics.unifi.client.wifi.isEmpty()"
      ignore_missing: true
on_failure:
  - append:
      field: error.message
      value: >-
        Processor {{ _ingest.on_failure_processor_type }} (tag:
        {{ _ingest.on_failure_processor_tag }}) failed with message:
        {{ _ingest.on_failure_message }}
  - set:
      field: event.kind
      value: pipeline_error

- name: observer.mac
  type: keyword
  description: MAC address of the UniFi device (gateway/AP/switch) that raised the alarm.

- name: source.mac
  type: keyword
  description: MAC address of the client associated with the alarm.

- name: unifi.alarm.key
  type: keyword
  description: Alarm key/type identifier.

- name: unifi.alarm.msg
  type: text
  description: Human-readable alarm message.

- name: unifi.alarm.subsystem
  type: keyword
  description: UniFi subsystem that raised the alarm.

- name: unifi.alarm.archived
  type: boolean
  description: Whether the alarm has been acknowledged/archived.

- name: unifi.alarm.device_mac
  type: keyword
  description: MAC address of the device associated with the alarm.

- name: unifi.alarm.client_mac
  type: keyword
  description: MAC address of the client associated with the alarm.

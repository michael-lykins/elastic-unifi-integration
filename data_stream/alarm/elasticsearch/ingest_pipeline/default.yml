---
description: Pipeline for UniFi alarms
processors:
  - set:
      field: ecs.version
      value: "8.11.0"
  - set:
      field: event.kind
      value: alert
  - set:
      field: event.category
      value: network
  - remove:
      field: observer.mac
      if: "ctx?.observer?.mac == ''"
      ignore_missing: true
  - remove:
      field: source.mac
      if: "ctx?.source?.mac == ''"
      ignore_missing: true
on_failure:
  - append:
      field: error.message
      value: >-
        Processor {{ _ingest.on_failure_processor_type }} (tag:
        {{ _ingest.on_failure_processor_tag }}) failed with message:
        {{ _ingest.on_failure_message }}
  - set:
      field: event.kind
      value: pipeline_error

- name: unifi.firewall_policy.id
  type: keyword
  description: Unique policy UUID assigned by UniFi.

- name: unifi.firewall_policy.name
  type: keyword
  description: Human-readable policy name (may be empty for auto-generated rules).

- name: unifi.firewall_policy.enabled
  type: boolean
  description: Whether this policy is currently active.

- name: unifi.firewall_policy.index
  type: integer
  description: >
    Policy ordering index — lower values are evaluated first.
    System catch-all rules typically use index 2147483647.

- name: unifi.firewall_policy.action.type
  type: keyword
  description: Policy action — ALLOW, BLOCK, or REJECT.

- name: unifi.firewall_policy.action.allow_return_traffic
  type: boolean
  description: Whether matching return (established/related) traffic is automatically allowed.

- name: unifi.firewall_policy.source.zone_id
  type: keyword
  description: UUID of the source firewall zone.

- name: unifi.firewall_policy.source.zone_name
  type: keyword
  description: Human-readable name of the source zone (e.g. Internal, External, Gateway).

- name: unifi.firewall_policy.source.filter_type
  type: keyword
  description: Source traffic filter type — ANY, MAC_ADDRESS, or IP_ADDRESS.

- name: unifi.firewall_policy.source.mac_addresses
  type: keyword
  description: >
    MAC addresses in the source filter (when filter_type is MAC_ADDRESS).
    Multi-value field — one entry per MAC.

- name: unifi.firewall_policy.source.ip_addresses
  type: ip
  description: >
    IP addresses or CIDR ranges in the source filter (when filter_type is IP_ADDRESS).
    Multi-value field — one entry per address/range.

- name: unifi.firewall_policy.source.ports
  type: keyword
  description: >
    Ports or port ranges in the source port filter.
    Multi-value field — one entry per port or range string.

- name: unifi.firewall_policy.destination.zone_id
  type: keyword
  description: UUID of the destination firewall zone.

- name: unifi.firewall_policy.destination.zone_name
  type: keyword
  description: Human-readable name of the destination zone (e.g. Internal, External, Gateway).

- name: unifi.firewall_policy.destination.filter_type
  type: keyword
  description: Destination traffic filter type — ANY, MAC_ADDRESS, or IP_ADDRESS.

- name: unifi.firewall_policy.destination.mac_addresses
  type: keyword
  description: MAC addresses in the destination filter (when filter_type is MAC_ADDRESS).

- name: unifi.firewall_policy.destination.ip_addresses
  type: ip
  description: >
    IP addresses or CIDR ranges in the destination filter (when filter_type is IP_ADDRESS).
    Multi-value field — one entry per address/range.

- name: unifi.firewall_policy.destination.ports
  type: keyword
  description: >
    Ports or port ranges in the destination port filter.
    Multi-value field — one entry per port or range string.

- name: unifi.firewall_policy.ip_version
  type: keyword
  description: IP version scope — IPV4, IPV6, or IPV4_AND_IPV6.

- name: unifi.firewall_policy.ip_protocol
  type: keyword
  description: >
    Layer-4 protocol filter — TCP, UDP, ICMP, ICMPv6, etc.
    "ANY" when no protocol restriction is configured.
    A rule with filter_type ANY and ip_protocol ANY matches ALL traffic in its zone pair.

- name: unifi.firewall_policy.logging_enabled
  type: boolean
  description: Whether traffic matching this policy generates iptables LOG entries.

- name: unifi.firewall_policy.origin
  type: keyword
  description: Policy origin — USER_DEFINED or SYSTEM_DEFINED.

- name: unifi.firewall_policy.config_hash
  type: keyword
  description: >
    SHA-256 fingerprint of the rule's complete configuration (name, action, zones,
    filter values, protocol scope, logging state). Used by the Kibana change-detection
    alerting rule to identify when any aspect of a rule has been added, removed, or modified.

---
description: >
  Pipeline for UniFi firewall policy configuration records collected from
  the Integration API v1.  Sets ECS metadata and derives event.action from
  the policy action type.
processors:
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: "8.11.0"

  - set:
      tag: set_event_module
      field: event.module
      value: unifi

  - set:
      tag: set_event_kind
      field: event.kind
      value: state

  - set:
      tag: set_event_category
      field: event.category
      value: configuration

  - set:
      tag: set_service_name
      field: service.name
      value: unifi

  # ── Derive event.action from action type ────────────────────────────────────
  - script:
      tag: set_event_action
      lang: painless
      if: "ctx.unifi?.firewall_policy?.action?.type != null"
      source: |
        String t = ctx.unifi.firewall_policy.action.type;
        if (t == 'ALLOW') {
          ctx.event.action = 'firewall_accept';
        } else if (t == 'BLOCK') {
          ctx.event.action = 'firewall_block';
        } else if (t == 'REJECT') {
          ctx.event.action = 'firewall_reject';
        } else {
          ctx.event.action = t.toLowerCase();
        }

  # ── Mark disabled policies ───────────────────────────────────────────────────
  - set:
      tag: set_event_type_disabled
      field: event.type
      value: info
      if: "ctx.unifi?.firewall_policy?.enabled == false"

  - set:
      tag: set_event_type_enabled
      field: event.type
      value: allowed
      if: "ctx.unifi?.firewall_policy?.enabled == true && ctx.unifi?.firewall_policy?.action?.type == 'ALLOW'"

  - set:
      tag: set_event_type_blocked
      field: event.type
      value: denied
      if: "ctx.unifi?.firewall_policy?.enabled == true && (ctx.unifi?.firewall_policy?.action?.type == 'BLOCK' || ctx.unifi?.firewall_policy?.action?.type == 'REJECT')"

  # ── Config fingerprint for change detection ─────────────────────────────────
  # SHA-256 hash of the rule's complete configuration. When this hash changes
  # between two consecutive poll windows for the same rule ID, a Kibana alerting
  # rule detects it and creates an audit record showing exactly what changed.
  # Covers everything that defines rule behaviour: name, action, zones, filter
  # values (MACs/IPs/ports), protocol scope, logging state. Rule ID and origin
  # are excluded — they are stable identifiers, not configuration.
  - fingerprint:
      tag: fingerprint_rule_config
      fields:
        - unifi.firewall_policy.name
        - unifi.firewall_policy.enabled
        - unifi.firewall_policy.index
        - unifi.firewall_policy.action.type
        - unifi.firewall_policy.action.allow_return_traffic
        - unifi.firewall_policy.source.zone_id
        - unifi.firewall_policy.source.filter_type
        - unifi.firewall_policy.source.mac_addresses
        - unifi.firewall_policy.source.ip_addresses
        - unifi.firewall_policy.source.ports
        - unifi.firewall_policy.destination.zone_id
        - unifi.firewall_policy.destination.filter_type
        - unifi.firewall_policy.destination.mac_addresses
        - unifi.firewall_policy.destination.ip_addresses
        - unifi.firewall_policy.destination.ports
        - unifi.firewall_policy.ip_version
        - unifi.firewall_policy.ip_protocol
        - unifi.firewall_policy.logging_enabled
      target_field: unifi.firewall_policy.config_hash
      method: SHA-256
      ignore_missing: true

on_failure:
  - append:
      field: error.message
      value: >-
        Processor {{ _ingest.on_failure_processor_type }} (tag:
        {{ _ingest.on_failure_processor_tag }}) failed with message:
        {{ _ingest.on_failure_message }}
  - set:
      field: event.kind
      value: pipeline_error

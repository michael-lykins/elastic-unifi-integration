- version: "0.8.4"
  changes:
    - description: >
        Fix iptables firewall event message field. (1) Extract log.syslog.priority from
        the <PRI> prefix (was silently discarded). (2) Rewrite message from raw syslog
        line to a clean human-readable summary, e.g. "WAN ICMP ECHO - Request: tcp
        177.36.62.220:47459 -> 142.56.57.103:443 in:eth8" — all KV data is already
        parsed into ECS fields so the raw wire format in message was redundant noise.
      type: enhancement
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/23
- version: "0.8.3"
  changes:
    - description: >
        Fix ECS compliance for iptables/firewall events in the events ingest pipeline.
        (1) Correct event.category from "firewall" (invalid) to "network" (ECS standard).
        (2) Set event.type ("connection" / "denied") and event.outcome ("success") for
        bracket-format iptables events. (3) Lowercase network.transport — iptables PROTO
        field is uppercase (TCP/UDP/ICMP) but ECS requires lowercase. (4) Fix source.mac
        extraction — iptables MAC= field is the full Ethernet frame header (DST:SRC:ETHERTYPE);
        now splits into destination.mac (first 6 octets) and source.mac (next 6 octets),
        formatted per RFC 7042 (uppercase, hyphen-separated). (5) Declare missing ECS fields:
        destination.mac, rule.description, observer.mac, observer.product, user.target.name,
        event.outcome.
      type: enhancement
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/23
- version: "0.8.2"
  changes:
    - description: Fix syslog panels on Overview, Clients, and Insights dashboards — syslog events now route to logs-unifi.events-* (not logs-unifi.syslog-*) since Elastic Agent 9.3.2. Update all adHocDataView index patterns and ES|QL queries to use logs-unifi.events-* so recent-window time pickers show data correctly.
      type: bugfix
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/22
- version: "0.8.1"
  changes:
    - description: Fix DHCP Events by AP/Host panel — column mapping referenced client_mac but query groups by iface, causing "invalid column" error.
      type: bugfix
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/21
- version: "0.8.0"
  changes:
    - description: Fix DPI pie chart (primaryGroups/metrics schema) and table (flat viz format) so Traffic by Category and Top 30 Apps panels render correctly. Add timeFieldName to all adHocDataViews in Devices, Topology, Firewall, and DPI dashboards so the time picker filters correctly. Widen default time range from 24h to 7d on Overview, Clients, Insights, and Firewall dashboards for better syslog/event visibility.
      type: bugfix
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/21
- version: "0.7.9"
  changes:
    - description: Add DPI dashboard with 9 panels — Total Traffic/Download/Upload/Unique-Apps KPIs, Top 15 Apps horizontal bar, Traffic by Category donut, Download vs Upload stacked bar, and detailed app table. Add DPI nav link to all 6 existing dashboards.
      type: enhancement
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/20
- version: "0.7.8"
  changes:
    - description: Remove Health dashboard — data is visible in other dashboards. Strip Health nav link from all remaining dashboard nav bars (Overview, Topology, Devices, Clients, Insights, Firewall).
      type: enhancement
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/19
- version: "0.7.7"
  changes:
    - description: Fix DPI app name resolution — use compound ID (cat*65536+app) for lookup so apps in non-IM categories (SSL/TLS=239GB, QUIC, Zoom, YouTube, Spotify, iCloud, Gmail, Apple.com, etc.) now resolve correctly instead of returning wrong category-0 names. Add missing small-ID entries (MSN, Raidcall, Beanfun). Add TRIM(client_mac) after DISSECT in DHCP queries to strip trailing newline. Fix DHCP Events by AP/Host to group by interface. Fix timeFieldName on all adHocDataViews so all KPI panels respond to dashboard time picker. Fix Health dashboard — Uptime panel was using empty snmp index; WAN Latency and Throughput panels were using zeroed-out Logstash index; all three now read from metrics-unifi.device-default.
      type: bugfix
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/18
- version: "0.7.6"
  changes:
    - description: Fix DPI data stream for UniFi Network 10.x — migrate from stat/sitedpi (dropped in v10 migration) to stat/report/daily.gw. DPI stats are now read from the embedded dpi map in the daily gateway report and parsed as per-app events, restoring app/category traffic visibility.
      type: bugfix
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/16
    - description: Fix Most Active Clients panel in Clients dashboard — was querying client.hostname (never populated); now uses DISSECT on raw message to extract client_mac from DHCP syslog entries.
      type: bugfix
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/17
- version: "0.7.5"
  changes:
    - description: Add Firewall dashboard with 15 panels — WAN attack KPIs, protocol trend, top attacking IPs, top targeted ports, attack type classification, policy zone summary, zone policy matrix (Vega heatmap), and active policy table. Add Firewall nav link to all existing dashboards.
      type: enhancement
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/15
- version: "0.7.4"
  changes:
    - description: Fix Connected Clients KPI panels (Clients, Overview, Devices dashboards) — was incorrectly summing all polling intervals producing inflated counts; now uses MAX per device in the last 2 minutes then SUM.
      type: bugfix
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/14
- version: "0.7.3"
  changes:
    - description: Format WAN Throughput as Mbps (converted from bytes/sec), Device Status Table uptime as hours, Topology Uptime chart as decimal hours.
      type: enhancement
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/13
- version: "0.7.2"
  changes:
    - description: Fix dashboard ES|QL queries to use ECS-mapped observer.type values (udm→router, uap→wap, usw→switch) after CEL template ECS migration.
      type: bugfix
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/12
- version: "0.7.1"
  changes:
    - description: Bundle all 5 dashboards (Overview, Topology, Devices, Clients, Insights) in the integration package so they install automatically and appear as Managed assets. Vega topology visualization embedded inline.
      type: enhancement
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/11
- version: "0.7.0"
  changes:
    - description: >
        ECS compliance pass across all data streams. Device identity fields moved to observer.* (observer.name, observer.mac, observer.ip, observer.version, observer.product) and device type normalized to observer.type (router/wap/switch). Events stream firewall interface fields corrected to observer.ingress/egress.interface.name. Client stream adds network.name, network.vlan.id, observer.mac and fixes client.ip to ip type. IPS event stream adds rule.name, event.action, source.geo.country_iso_code. Alarm stream adds observer.mac and source.mac. Rogue AP stream adds network.name and observer.mac. All dashboards updated to use new ECS field paths.
      type: enhancement
      link: https://github.com/michael-lykins/elastic-unifi-integration/issues/10
- version: "0.6.4"
  changes:
    - description: Add DPI app and category name resolution. Ingest pipeline now maps numeric UniFi DPI IDs to human-readable names (app_name, cat_name fields) using the complete 2,120-application and 35-category lookup table extracted directly from the UDM-Pro firmware (/usr/share/dpi/tdts/rule.json).
      type: enhancement
      link: https://github.com/michael-lykins/unifi-telemetry/issues/9
- version: "0.6.3"
  changes:
    - description: Fix DPI data stream — filter out empty records returned by the UniFi sitedpi API when no traffic has been classified (API returns [{}]). Clarify that app and cat fields are numeric IDs, not human-readable names.
      type: bugfix
      link: https://github.com/michael-lykins/unifi-telemetry/issues/9
- version: "0.6.2"
  changes:
    - description: Fix @timestamp timezone — BSD-style syslog timestamps from the UDM-Pro (America/Chicago) were being stored as UTC, placing all events 5 hours in the past. Date processor now uses America/Chicago so CDT/CST timestamps are correctly converted to UTC. ISO8601 timestamps (which carry an explicit offset) are unaffected.
      type: bugfix
      link: https://github.com/michael-lykins/unifi-telemetry/issues/8
- version: "0.6.1"
  changes:
    - description: Fix double-hostname syslog parsing so sshd, sudo, earlyoom, and other UDM-Pro system processes are correctly identified. Add authentication classification for sshd (invalid user, failed password, accepted, disconnect with source IP extraction). Add process classification for sudo. Handle device-forwarded logs from UniFi APs and switches (MAC,model process name → observer.mac + embedded PROG re-parse).
      type: bugfix
      link: https://github.com/michael-lykins/unifi-telemetry/issues/7
- version: "0.6.0"
  changes:
    - description: Add firewall_policy data stream collecting firewall rule configuration (name, action, source/destination zones, ordering index, logging state) from the UniFi Network Integration API v1.
      type: enhancement
      link: https://github.com/michael-lykins/unifi-telemetry/issues/6
- version: "0.5.0"
  changes:
    - description: Fix iptables NFLOG bracket-format parsing in events pipeline so firewall rule-hit messages correctly populate source.ip, destination.ip, rule.name, and network.transport fields.
      type: bugfix
      link: https://github.com/michael-lykins/unifi-telemetry/issues/5
- version: "0.4.0"
  changes:
    - description: Add client, health, alarm, ips_event, dpi, and rogue_ap data streams covering all major UniFi Network Local API endpoints.
      type: enhancement
      link: https://github.com/michael-lykins/unifi-telemetry/issues/4
- version: "0.3.0"
  changes:
    - description: Move UDP host config to top-level (remove udp wrapper) to fix 127.0.0.1:8080 default binding issue.
      type: bugfix
      link: https://github.com/michael-lykins/unifi-telemetry/issues/3
- version: "0.2.0"
  changes:
    - description: Fix duplicate @timestamp in device metrics; remove conflicting input-level UDP vars so per-stream listen_address/listen_port render correctly.
      type: bugfix
      link: https://github.com/michael-lykins/unifi-telemetry/issues/2
- version: "0.1.0"
  changes:
    - description: Initial release. Device metrics via UniFi Network API (CEL input) and syslog events via UDP.
      type: enhancement
      link: https://github.com/michael-lykins/unifi-telemetry/issues/1
